<html>
    <head>
        <title></title>
    </head>

    <body>
        <form>
            
            <table bgcolor="lightblue" align="center" width="900">
                <tr>
                    <td><h1><center>Student Register Form</center></h1></td>
                </tr>
                
				<tr>
                    <td>Name:</td>
                    <td><input type="text" placeholder="Enter full name"><br><br></td>
                </tr>
                <tr> 
					<td>Father's Name: </td>

				</tr>

                <tr> 
					<td>Mother's Name: </td>
					<td> <input type="text"><br><br> </td>
				</tr>


               

                <tr>
                    <td>Phone number:</td>
                    <td><input type="number" placeholder="017xxxxxxxx"><br><br></td>
                </tr>

                <tr>
					<td> Email: </td>
					<td> <input type="email" size="20" placeholder="sample@example.com"> <br><br></td>
				</tr>

                <tr>
					<td> Gender: </td>

						<input type="radio" name="r">Male
						<input type="radio" name="r">Female
                        <input type="radio" name="r">Others <br><br>
						</td>
				</tr>

					<td>Date of Birth:</td>

                </tr>

                <tr>
                    <td>Adress</td>
                    <td><textarea cols=55 rows=1 placeholder="Street- House- Road:-"> </textarea> <br> <br></td>
                </tr>

                <tr>
                    <td>Blood Group:</td>
                    <td>
                        <select>
							<option> A positive</option>
							<option> B positive </option>
							<option> A nagative </option>
							<option> B nagative </option>
						</select><br><br>
                    </td>
                        
                </tr>

                 <tr>
                    
                    <td>Department:</td>
						<td>
                        <input type="radio" name="r">CSE
						<input type="radio" name="r">EEE
                        <input type="radio" name="r">BBA <br><br>
                        </td>
                </tr>

                <tr>
                    <td>Course:</td>
                    <td>
                            <input type="checkbox"> C
							<input type="checkbox"> C++
							<input type="checkbox"> Java
                            <input type="checkbox"> AI
							<input type="checkbox"> Machine learning
							<input type="checkbox"> Robotics <br><br>
                    </td>
                </tr>

               <tr>
                    <td>photo:</td>
                    <td>
				        <input type="file"> <br><br></td>
                </tr>
				
				<tr>
                    <td>
                        <input type="submit" > 
			            <input type="reset" >
                    </td>
                </tr>
				
			</table>
        </form>

</html>

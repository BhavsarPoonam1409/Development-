<html>
	<title> Formatting fonts </title>
<body bgcolor="lightblue" text="darkblue" align="center"> 
	<b> Poonam </b> <br>
	<i> Poonam </i> <br>
	<u> Poonam </u> <br>
	<small> Poonam </small> <br>
	<big> Poonam </big> <br>
	<strike> Poonam </strike> <br>  <!-- del  -->
	<strong> Poonam </strong> <br>  <!-- bold -->
	H<sub> 2 </sub> O <br>
	4<sup> 3 </sup> <br>
	<tt> Poonam </tt> <br>   <!-- typewriter -->
	<mark> Poonam </mark> <br> <!-- yellowcolor -->
	<ins> Poonam </ins> <br> <!-- u -->
	<del> Poonam </del> <br> <!-- strike -->
	<em> Poonam </em> <br>   <!-- italic -->	
	
</body>
 </html>

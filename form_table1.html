<html>
	<head>
		<title> </title>
	</head>
	<body>
		<form>
			<table bgcolor="lightblue" align="center" width="900">
				<tr> 
					<td>Student's Name: </td>
					<td> <input type="text" placeholder="Full name"> </td>
				</tr>
				<tr> 
					<td>Father's Name: </td>
					<td> <input type="text" placeholder="Father's Full name"> </td>
				</tr>
				<tr> 
					<td>Mother's Name: </td>
					<td> <input type="text" placeholder="Mother's Full name"> </td>
				</tr>
				
				<tr>
					<td> Gender: </td>
					<td>
						Male<input type="radio" name="r">
						Female<input type="radio" name="r">
						Other<input type="radio" name="r">
					</td>
				</tr>
				<tr>
					<td> Date of Birth: </td>
					<td> <input type="date"> </td>
				</tr>
				<tr>
					<td> Email: </td>
					<td> <input type="email" placeholder="xyz@gmail.com"> </td>
				</tr>
				<tr>
					<td> Level: </td>
					<td> 
						<select>
							<option> High School</option>
							<option> Secondary School </option>
							<option> Bachlore </option>
							<option> Master </option>
						</select>
					</td>
				</tr>
				<tr>
					
					<td> Submit: <input type="submit" style="background-color:orange; width:100px;"> </td>
					<td> Reset: <input type="reset" style="background-color:orange; width:100px;"> </td>
				</tr>
			</table>
		</form>
	</body>
 </html>

<html>
	<head>
		<title> Form 1 </title>
	</head> 
	
	<body>
		
		<form style="background-color:lightblue;" align="center">
			Name: <input type="text" placeholder="Enter Your Name"> <br> <br>
			Age: <input type="number" > <br> <br>  <!-- tel use text bhi likh skte hain-->
			Email id: <input type="text"> <br> <br>
			Mobile No: <input type="number"> <br> <br>
			Mobile No: <input type="tel"> <br> <br>
			Password: <input type="password"> <br> <br>
			
			Hobbies: 
			Coding<input type="checkbox"> 
			Travele<input type="checkbox"> 
			Music<input type="checkbox"> 
			VideoEditing<input type="checkbox"> <br> <br>
			
			Gender:
			Male<input type="radio" name="r1">
			Female<input type="radio" name="r1"> <br> <br>
			
			Address: <br>
			<textarea cols=20 rows=5> </textarea> <br> <br>
			
			<!-- drop down--->
			City:<br>  <!--for use niche ke line se aayega-->
			<select size=2 multiple>  <!--- selected and size use, multiple use for one se jyada select dikhe  --->
				<option>---Select City---</option>
				<option> Mumbai </option>
				<option selected> Puna </option>
				<option selected> Ahmedabad </option>
			</select><br><br>
			
			Select Your File:
				<input type="file"> <br><br>
				
			Enter Your Link:
				<input type ="url"><br><br>
				
			Search Here:
				<input type = "search"><br><br>
			
			<!-- date,datetime,week--->
			DOB:
				<input type="date"><br><br>
				
			Time:
				<input type="datetime-local"><br><br>
				
			<!-- total year week,month--->
			
			Week:
				<input type="week"> <br><br>
			Month:
				<input type="month"> <br><br>
				
			Choose Your Color:
				<input type="color"><br><br>
			
			<!-- submit, reset, button-->			
			<input type="submit" value="Login"> 
			<input type="reset" value="clear">
			<input type="button" value="click">  <!--use to event for php javascript-->
			
			<!--Place holder-->
			<!--placeholder="Enter your Name"-->
		</form>
	
	</body>
</html>
